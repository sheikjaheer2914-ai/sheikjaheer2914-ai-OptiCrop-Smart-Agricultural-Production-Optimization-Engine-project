<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OptiCrop Control Panel</title>
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-heading: #ffffff;
            --brand: #238636;
            --brand-hover: #2ea043;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background-color: var(--surface); border-right: 1px solid var(--border); padding: 2rem 1.5rem; flex-shrink: 0; }
        .sidebar h2 { color: var(--text-heading); font-size: 1.35rem; margin-bottom: 0.5rem; font-weight: 600; }
        .sidebar p { color: #8b949e; font-size: 0.85rem; line-height: 1.4; }
        .main-content { flex-grow: 1; padding: 2.5rem 3.5rem; max-width: 1100px; }
        .section-panel { background-color: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.75rem; margin-bottom: 1.5rem; }
        .section-panel h4 { color: var(--text-heading); font-size: 1.1rem; margin-bottom: 1.25rem; font-weight: 500; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.875rem; font-weight: 500; color: #c9d1d9; }
        .input-control { background-color: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 0.55rem 0.75rem; font-size: 0.9rem; font-family: inherit; width: 100%; }
        .input-control:focus { outline: none; border-color: #58a6ff; }
        .btn-submit { background-color: var(--brand); color: #ffffff; border: 1px solid rgba(240,246,252,0.1); border-radius: 6px; padding: 0.65rem 2rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: inline-block; }
        .btn-submit:hover { background-color: var(--brand-hover); }
        .actions-bar { display: flex; justify-content: flex-end; margin-top: 1rem; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>🌾 OptiCrop</h2>
        <p>Engine Dashboard</p>
    </aside>
    <main class="main-content">
        <form action="/predict" method="POST">
            <div class="section-panel">
                <h4>Operational Objective</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Select Execution Scenario</label>
                        <select name="scenario" class="input-control">
                            <option value="1">Scenario 1: Crop Recommendation</option>
                            <option value="2">Scenario 2: Suitability Assessment</option>
                            <option value="3">Scenario 3: Policy Strategy Reports</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Target Crop Evaluation (Scenario 2)</label>
                        <select name="target_crop" class="input-control">
                            <option value="rice">Rice</option>
                            <option value="maize">Maize</option>
                            <option value="pigeonpeas">Pigeon Peas</option>
                            <option value="chickpea">Chickpea</option>
                            <option value="kidneybeans">Kidney Beans</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="section-panel">
                <h4>Soil Chemistry Properties</h4>
                <div class="grid-3">
                    <div class="form-group"><label>Nitrogen (N) mg/kg</label><input type="number" name="N" class="input-control" value="90" required></div>
                    <div class="form-group"><label>Phosphorus (P) mg/kg</label><input type="number" name="P" class="input-control" value="42" required></div>
                    <div class="form-group"><label>Potassium (K) mg/kg</label><input type="number" name="K" class="input-control" value="43" required></div>
                </div>
            </div>
            <div class="section-panel">
                <h4>Macroclimate Factors</h4>
                <div class="grid-2" style="margin-bottom: 1.25rem;">
                    <div class="form-group"><label>Temperature (°C)</label><input type="number" step="any" name="temperature" class="input-control" value="20.8" required></div>
                    <div class="form-group"><label>Humidity (%)</label><input type="number" step="any" name="humidity" class="input-control" value="82.0" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Soil pH Configuration</label><input type="number" step="0.01" name="ph" class="input-control" value="6.50" required></div>
                    <div class="form-group"><label>Rainfall Index (mm)</label><input type="number" step="any" name="rainfall" class="input-control" value="202.0" required></div>
                </div>
            </div>
            <div class="actions-bar"><button type="submit" class="btn-submit">Execute Model Inference</button></div>
        </form>
    </main>
</body>
</html>
